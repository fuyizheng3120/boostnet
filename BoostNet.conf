# ============================================================
# BoostNet — Surge 分流规则配置
# 广告拦截 (Sukka RuleSet) + 国内外智能分流 (Loyalsoldier)
# 适用：Surge 5 (macOS / iOS)
# 说明：需自行填入机场订阅地址，规则集全部远程拉取、自动更新
# 项目：https://github.com/fuyizheng3120/boostnet
# ============================================================

[General]
loglevel = notify
dns-server = 223.5.5.5, 119.29.29.29
doh-server = https://doh.pub/dns-query
skip-proxy = localhost, *.local, injections.adguard.org, local.adguard.org, captive.apple.com, guzzoni.apple.com, 0.0.0.0/8, 10.0.0.0/8, 17.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.168.0.0/16, 198.18.0.0/15, 224.0.0.0/4, 240.0.0.0/4, 255.255.255.255/32
wifi-assist = true
allow-wifi-access = true
wifi-access-http-port = 6152
wifi-access-socks5-port = 6153
http-listen = 0.0.0.0:6152
socks5-listen = 0.0.0.0:6153
external-controller-access = your-password@0.0.0.0:6170
exclude-simple-hostnames = true
ipv6 = true
test-timeout = 4
proxy-test-url = http://www.gstatic.com/generate_204
geoip-maxmind-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb

[Proxy]
# ==========================================================
# 请替换为你的机场订阅地址（Surge 托管格式，支持 #!include）
# ==========================================================
# #!include https://your-subscription-url

[Proxy Group]
# ==========================================================
# 请替换为你的机场订阅地址
# ==========================================================
# #!include https://your-subscription-url
#
# 如果你的机场不自动生成策略组，可手动创建：
# Proxies = select, 节点1, 节点2, ...
# AI = select, 节点1, 节点2, ...
# Telegram = select, 节点1, 节点2, ...
# 🎯Direct = select, DIRECT, Proxies
# ✈️Final = select, Proxies, DIRECT

[Rule]
# ========================================
# 自定义规则 (优先级最高，按需添加)
# ========================================
# DOMAIN,example.com,DIRECT
# DOMAIN-SUFFIX,example.com,Proxies

# ========================================
# 广告拦截 (Sukka RuleSet，覆盖全面)
# ========================================
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject.conf,REJECT,extended-matching
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject_extra.conf,REJECT,extended-matching
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/reject_phishing.conf,REJECT,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject.conf,REJECT,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-drop.conf,REJECT-DROP,extended-matching
RULE-SET,https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf,REJECT,extended-matching

# ========================================
# 专项服务 (需对应策略组)
# ========================================
# AI 服务 (OpenAI / Claude / Gemini / etc.) → AI 组
RULE-SET,https://ruleset.skk.moe/List/non_ip/ai.conf,AI,extended-matching
# Telegram 域名 → Telegram 组
RULE-SET,https://ruleset.skk.moe/List/non_ip/telegram.conf,Telegram,extended-matching

# ========================================
# Loyalsoldier 基础分流 (白名单模式)
# 核心逻辑：国内域名/IP 直连，国外域名走代理
# 未匹配流量全部走代理，确保不遗漏
# ========================================

# 私有网络 / LAN → 直连
RULE-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/ruleset/private.txt,🎯Direct

# Apple / iCloud → 直连
DOMAIN-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/icloud.txt,🎯Direct
DOMAIN-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/apple.txt,🎯Direct

# 国外域名 → 代理 (force-remote-dns 防止 DNS 污染)
DOMAIN-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/proxy.txt,Proxies,force-remote-dns

# 国内域名 → 直连
DOMAIN-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/direct.txt,🎯Direct

# ========================================
# IP 规则
# ========================================
# 广告 IP 拦截
RULE-SET,https://ruleset.skk.moe/List/ip/reject.conf,REJECT-DROP,extended-matching
# Telegram IP → Telegram 组
RULE-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/ruleset/telegramcidr.txt,Telegram
# 中国 IP → 直连
RULE-SET,https://cdn.jsdelivr.net/gh/Loyalsoldier/surge-rules@release/ruleset/cncidr.txt,🎯Direct

# ========================================
# 兜底规则 (白名单模式：未匹配 → 走代理)
# ========================================
GEOIP,CN,🎯Direct
FINAL,✈️Final,dns-failed

[URL Rewrite]
^https?://(www.)?(g|google).cn https://www.google.com 302
